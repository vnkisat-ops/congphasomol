    // --- FORMULAS & MARKDOWN COMPACT PARSING UTILITIES ---
    function formatChemicalFormula(text) {
      if (!text) return "";
      const subscripts = {
        "0": "₀", "1": "₁", "2": "₂", "3": "₃", "4": "₄",
        "5": "₅", "6": "₆", "7": "₇", "8": "₈", "9": "₉"
      };
      const superscripts = {
        "+": "⁺", "-": "⁻", "0": "⁰", "1": "¹", "2": "²",
        "3": "³", "4": "⁴", "5": "⁵", "6": "⁶", "7": "⁷",
        "8": "⁸", "9": "⁹"
      };

      let result = text.replace(/\$/g, "");
      result = result.replace(/([A-Za-z])_([0-9]+)/g, (_, element, num) => {
        const subNum = num.split("").map(char => subscripts[char] || char).join("");
        return element + subNum;
      });
      result = result.replace(/\^\{?([0-9+-]+)\}?/g, (_, charge) => {
        return charge.split("").map(char => superscripts[char] || char).join("");
      });

      const commonReplacements = {
        "H2SO4": "H₂SO₄", "SO2": "SO₂", "H2S": "H₂S", "HNO3": "HNO₃",
        "N2O": "N₂O", "NH3": "NH₃", "NO2": "NO₂", "KMnO4": "KMnO₄",
        "NH4+": "NH₄⁺", "NO3-": "NO₃⁻", "SO42-": "SO₄²⁻", "Cr2O72-": "Cr₂O₇²⁻",
        "CH4": "CH₄", "C2H5OH": "C₂H₅OH", "Fe3O4": "Fe₃O₄", "O2": "O₂",
        "CO2": "CO₂", "Al2(SO4)3": "Al₂(SO₄)₃", "H2": "H₂", "FeSO4": "FeSO₄",
        "MgSO4": "MgSO₄", "NaClO": "NaClO", "NaCl": "NaCl", "KClO3": "KClO₃",
        "KCl": "KCl", "Fe(NO3)3": "Fe(NO₃)₃", "M(NO3)n": "M(NO₃)ₙ", "NxOy": "NₓO_y"
      };

      Object.entries(commonReplacements).forEach(([key, val]) => {
        const regex = new RegExp(`\\b${key}\\b`, 'g');
        result = result.replace(regex, val);
      });

      return result;
    }

    function extractBraceContent(str, startIndex) {
      let depth = 0;
      let content = "";
      for (let i = startIndex; i < str.length; i++) {
        const char = str[i];
        if (char === "{") {
          if (depth > 0) content += char;
          depth++;
        } else if (char === "}") {
          depth--;
          if (depth === 0) return { content, endIndex: i };
          content += char;
        } else {
          if (depth > 0) content += char;
        }
      }
      return null;
    }

    function parseFractions(expr) {
      let index = expr.indexOf("\\frac");
      if (index === -1) return null;
      
      const parts = [];
      let currentIdx = 0;
      
      while (index !== -1) {
        if (index > currentIdx) {
          parts.push(
            <span key={`text-${currentIdx}`}>
              {renderFormulaSubtreeWithoutFrac(expr.substring(currentIdx, index))}
            </span>
          );
        }
        
        const numOpenIdx = expr.indexOf("{", index + 5);
        if (numOpenIdx === -1) break;
        const numRes = extractBraceContent(expr, numOpenIdx);
        if (!numRes) break;
        
        const denOpenIdx = expr.indexOf("{", numRes.endIndex + 1);
        if (denOpenIdx === -1) break;
        const denRes = extractBraceContent(expr, denOpenIdx);
        if (!denRes) break;
        
        const numerator = numRes.content;
        const denominator = denRes.content;
        
        parts.push(
          <span key={`frac-${index}`} className="inline-flex flex-col items-center justify-center align-middle mx-1.5 leading-none translate-y-[2px]">
            <span className="text-[12px] border-b border-indigo-300 pb-1 px-1.5 font-mono italic text-indigo-950 leading-none block text-center">
              {renderFormulaSubtree(numerator)}
            </span>
            <span className="text-[11px] pt-1 px-1.5 font-mono italic text-indigo-950 leading-none block text-center">
              {renderFormulaSubtree(denominator)}
            </span>
          </span>
        );
        
        currentIdx = denRes.endIndex + 1;
        index = expr.indexOf("\\frac", currentIdx);
      }
      
      if (currentIdx < expr.length) {
        parts.push(
          <span key="text-end">
            {renderFormulaSubtreeWithoutFrac(expr.substring(currentIdx))}
          </span>
        );
      }
      
      return parts;
    }

    function renderFormulaSubtree(formula) {
      const expr = formula.trim();
      const fracParts = parseFractions(expr);
      if (fracParts) {
        return <span className="inline-flex items-center gap-0.5">{fracParts}</span>;
      }
      return renderFormulaSubtreeWithoutFrac(expr);
    }

    function renderFormulaSubtreeWithoutFrac(formula) {
      const expr = formula.trim().replace(/\\\\/g, "\\");

      if (expr.includes("\\cdot") || expr.includes("·")) {
        const dots = expr.split(/\\cdot|·/);
        return (
          <span className="inline-flex items-center gap-0.5">
            {dots.map((part, index) => (
              <React.Fragment key={index}>
                {index > 0 && <span className="text-indigo-500 font-extrabold mx-1 text-[13px] select-none">·</span>}
                {renderFormulaSubtree(part)}
              </React.Fragment>
            ))}
          </span>
        );
      }

      const subRegex = /([A-Za-z]+)_\{?([A-Za-z0-9%]+)\}?/g;
      if (subRegex.test(expr)) {
        subRegex.lastIndex = 0;
        const parts = [];
        let lastIdx = 0;
        let match;
        while ((match = subRegex.exec(expr)) !== null) {
          if (match.index > lastIdx) {
            parts.push(<span key={`text-${lastIdx}`}>{expr.substring(lastIdx, match.index)}</span>);
          }
          const base = match[1];
          const sub = match[2];
          parts.push(
            <span key={`sub-${match.index}`} className="inline-flex items-baseline md:-translate-y-[1px]">
              <span className="italic font-bold font-sans text-slate-900">{base}</span>
              <sub className="text-[9px] text-indigo-700 font-extrabold select-none ml-0.5 font-mono">{sub}</sub>
            </span>
          );
          lastIdx = subRegex.lastIndex;
        }
        if (lastIdx < expr.length) {
          parts.push(<span key="text-end">{expr.substring(lastIdx)}</span>);
        }
        return <span className="inline-flex items-center">{parts}</span>;
      }

      let processed = expr.replace(/\^\\circ\\text\{([A-Za-z0-9]+)\}/g, "°$1")
                          .replace(/\^\\circ([A-Za-z0-9]+)/g, "°$1")
                          .replace(/\^\\circ/g, "°");

      if (processed === "n") return <span className="italic font-extrabold text-indigo-900 font-sans">n</span>;
      if (processed === "m") return <span className="italic font-semibold text-slate-800 font-mono text-[13px]">m</span>;
      if (processed === "M") return <span className="italic font-bold text-slate-800 font-sans text-[13px]">M</span>;
      if (processed === "V") return <span className="italic font-bold text-slate-800 font-mono text-[13px]">V</span>;
      if (processed === "100") return <span className="font-semibold text-slate-700 font-mono text-[12px]">100</span>;
      if (processed === "24,79") return <span className="font-extrabold text-indigo-650 font-mono text-[12px]">24,79</span>;

      return <span className="font-sans text-slate-800">{formatChemicalFormula(processed)}</span>;
    }

    function parseMarkdownBold(text) {
      const parts = text.split(/\*\*/);
      if (parts.length > 1) {
        return (
          <>
            {parts.map((part, index) => index % 2 === 1 
              ? <strong key={index} className="font-extrabold text-slate-950 font-sans">{part}</strong>
              : <span key={index}>{part}</span>
            )}
          </>
        );
      }
      return text;
    }

    function parseMathTextInline(text) {
      const inlineParts = text.split(/\$/);
      if (inlineParts.length > 1) {
        return (
          <span className="font-sans">
            {inlineParts.map((part, index) => index % 2 === 1
              ? <span key={index} className="inline-block bg-indigo-50/50 border border-indigo-100/30 rounded px-1 py-0.5 text-indigo-950 font-semibold mx-0.5 font-sans leading-none align-middle">{renderFormulaSubtree(part)}</span>
              : <span key={index}>{parseMarkdownBold(formatChemicalFormula(part))}</span>
            )}
          </span>
        );
      }
      return parseMarkdownBold(formatChemicalFormula(text));
    }

    function parseMathText(text) {
      if (!text) return "";
      const displayParts = text.split(/\$\$/);
      if (displayParts.length > 1) {
        return (
          <span className="flex flex-wrap items-center gap-1.5 my-2 justify-center py-2 px-4 bg-indigo-50/30 border border-indigo-100/50 rounded-2xl shadow-sm max-w-max mx-auto animate-fadeIn">
            {displayParts.map((part, index) => {
              if (index % 2 === 1) {
                if (part.includes("=")) {
                  const [left, right] = part.split("=");
                  return (
                    <span key={index} className="inline-flex items-center gap-1.5 font-sans leading-none">
                      {renderFormulaSubtree(left)}
                      <span className="text-indigo-600 font-extrabold font-mono text-sm select-none mx-0.5">=</span>
                      {renderFormulaSubtree(right)}
                    </span>
                  );
                }
                return <React.Fragment key={index}>{renderFormulaSubtree(part)}</React.Fragment>;
              }
              return <React.Fragment key={index}>{parseMathTextInline(part)}</React.Fragment>;
            })}
          </span>
        );
      }
      return parseMathTextInline(text);
    }

    function parseCellContent(text) {
      if (!text) return "";
      const lines = text.split(/<br\s*\/?>/i);
      if (lines.length > 1) {
        return (
          <div className="flex flex-col gap-2 py-0.5">
            {lines.map((line, idx) => <div key={idx} className="leading-normal">{parseCellContent(line)}</div>)}
          </div>
        );
      }
      if (text.includes("<li>")) {
        const matches = [];
        const liRegex = /<li>(.*?)<\/li>/g;
        let match;
        while ((match = liRegex.exec(text)) !== null) matches.push(match[1]);
        if (matches.length > 0) {
          return (
            <ul className="flex flex-col gap-1.5 list-none my-1 pl-1">
              {matches.map((item, idx) => (
                <li key={idx} className="flex items-start gap-2 text-xs text-slate-650 leading-relaxed">
                  <span className="w-1.5 h-1.5 bg-indigo-500 rounded-full mt-1.5 shrink-0" />
                  <div className="flex-1 font-sans">{parseMathText(item)}</div>
                </li>
              ))}
            </ul>
          );
        }
      }
      return parseMathText(text);
    }

    function parseMarkdownTheory(markdown) {
      const lines = markdown.split("\n");
      const elements = [];
      let currentTableRows = [];
      let currentTableHeader = [];
      let inTable = false;
      
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line.startsWith("|")) {
          if (line.includes("---")) { inTable = true; continue; }
          const cells = line.split("|").map(c => c.trim()).filter((_, idx, arr) => idx > 0 && idx < arr.length - 1);
          if (!inTable) { currentTableHeader = cells; inTable = true; } 
          else { currentTableRows.push(cells); }
          continue;
        } else {
          if (inTable && currentTableHeader.length > 0) {
            elements.push({ type: "table", tableHeader: currentTableHeader, tableRows: currentTableRows });
            currentTableHeader = []; currentTableRows = []; inTable = false;
          }
        }
        if (!line) continue;
        if (line.startsWith("###")) {
          elements.push({ type: "heading", content: line.replace("###", "").trim() });
          continue;
        }
        if (line.startsWith("*") || line.startsWith("-")) {
          const cleanItem = line.substring(1).trim();
          if (elements.length > 0 && elements[elements.length - 1].type === "list") {
            elements[elements.length - 1].items.push(cleanItem);
          } else {
            elements.push({ type: "list", items: [cleanItem] });
          }
          continue;
        }
        elements.push({ type: "paragraph", content: line });
      }
      if (inTable && currentTableHeader.length > 0) {
        elements.push({ type: "table", tableHeader: currentTableHeader, tableRows: currentTableRows });
      }
      return elements;
    }

    // --- CURRICULUM DATA ---
    const THEORY_RESOURCES = {

    // --- COMPONENT 2: QUIZ ENGINE ---
    function QuizEngine({ part, onLogMistake, onViewMistakes }) {
      const questionsList = useMemo(() => PRELOADED_QUESTIONS.filter(q => q.part === part), [part]);
      
      const [currentIndex, setCurrentIndex] = useState(0);
      const [userAnswers, setUserAnswers] = useState({}); // mappings: questionIndex -> chosen optionIndex
      const [score, setScore] = useState(0);
      const [quizFinished, setQuizFinished] = useState(false);

      // Reset when part changes
      useEffect(() => {
        setCurrentIndex(0);
        setUserAnswers({});
        setScore(0);
        setQuizFinished(false);
      }, [part]);

      const activeQuestion = questionsList[currentIndex];

      const handleOptionClick = (idx) => {
        if (quizFinished) return;
        setUserAnswers(prev => ({
          ...prev,
          [currentIndex]: idx
        }));
      };

      const handleNext = () => {
        if (currentIndex + 1 < questionsList.length) {
          setCurrentIndex(prev => prev + 1);
        } else {
          // Calculate score and log all incorrect ones in system
          let finalCalculatedScore = 0;
          questionsList.forEach((q, i) => {
            const ans = userAnswers[i];
            if (ans === q.correctOption) {
              finalCalculatedScore++;
            } else {
              // Store mistake
              const logEntry = {
                questionId: q.id,
                userAnswerIndex: ans !== undefined ? ans : -1,
                timestamp: new Date().toISOString(),
                reinforcementCategory: q.category,
                originalQuestion: q
              };
              onLogMistake(logEntry);
            }
          });
          setScore(finalCalculatedScore);
          setQuizFinished(true);
        }
      };

      const handleRestart = () => {
        setCurrentIndex(0);
        setUserAnswers({});
        setScore(0);
        setQuizFinished(false);
      };

      if (questionsList.length === 0) {
        return (
          <div className="bg-white border border-slate-200 shadow-sm rounded-2xl p-8 text-center max-w-md mx-auto">
            <LucideIcon name="AlertCircle" className="w-12 h-12 text-gray-300 mx-auto mb-3" />
            <h4 className="text-base font-semibold text-gray-900 mb-1">Đang chuẩn bị đề</h4>
            <p className="text-xs text-gray-500">Giáo trình củng cố bài tập hóa học đang được tổng hợp.</p>
          </div>
        );
      }

      if (quizFinished) {
        const pct = Math.round((score / questionsList.length) * 100);
        return (
          <div className="max-w-2xl mx-auto flex flex-col gap-6 animate-fadeIn">
            {/* Scorecard block */}
            <div className="bg-white border border-slate-200 shadow-md rounded-2xl p-6 text-center">
              <div className="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4 border border-indigo-100 shadow-inner">
                <LucideIcon name="BookOpen" className="w-7 h-7" />
              </div>
              <h3 className="text-lg font-bold text-slate-900 mb-1 font-display">Đã Hoàn Thành Thử Thách!</h3>
              <p className="text-xs text-slate-500 mb-4">Bạn vừa hoàn thành bộ đề luyện tập hóa học này. Kết quả chi tiết kết quả được tổng hợp chi tiết bên dưới.</p>
              
              <div className="bg-slate-50 border border-slate-200 rounded-xl p-4 mb-6">
                <div className="grid grid-cols-2 gap-4 divide-x divide-slate-200">
                  <div>
                    <span className="text-[10px] text-slate-400 font-mono block uppercase">Số Câu Đúng / Tổng</span>
                    <span className="text-xl font-bold text-slate-900 font-mono">{score} / {questionsList.length}</span>
                  </div>
                  <div>
                    <span className="text-[10px] text-slate-400 font-mono block uppercase font-bold text-indigo-700">Tỉ lệ chính xác</span>
                    <span className={`text-xl font-bold font-mono ${pct >= 70 ? "text-emerald-600" : "text-amber-500"}`}>{pct}%</span>
                  </div>
                </div>
              </div>
              
              <div className="flex flex-col sm:flex-row gap-3 justify-center">
                <button onClick={handleRestart} className="flex items-center justify-center gap-2 px-5 py-2 hover:bg-slate-200 text-slate-700 bg-slate-100 font-semibold text-xs rounded-xl transition-all shadow-sm">
                  <LucideIcon name="RotateCcw" className="w-3.5 h-3.5" /> Luyện lại từ đầu
                </button>
                <button onClick={onViewMistakes} className="flex items-center justify-center gap-2 px-5 py-2 bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs rounded-xl transition-all shadow-md shadow-indigo-500/10">
                  Lịch Sử Lỗi & Củng Cố <LucideIcon name="ChevronRight" className="w-3.5 h-3.5" />
                </button>
              </div>
            </div>

            {/* Comprehensive pedagogical evaluation report */}
            <div className="bg-white border border-slate-200 shadow-md rounded-2xl p-6 flex flex-col gap-6">
              <div className="flex items-center justify-between border-b border-slate-150 pb-3">
                <h4 className="font-bold text-slate-950 font-display flex items-center gap-2">
                  <LucideIcon name="CheckSquare" className="w-4.5 h-4.5 text-indigo-650 text-indigo-600" />
                  Bảng Tổng Kết & Đáp Án Chi Tiết
                </h4>
                <span className="text-xs bg-slate-100 text-slate-600 px-2.5 py-0.5 rounded-full font-mono font-semibold">
                  Tổng {questionsList.length} câu đã làm
                </span>
              </div>

              <div className="flex flex-col gap-6 max-h-[600px] overflow-y-auto pr-1">
                {questionsList.map((q, idx) => {
                  const userAnsIdx = userAnswers[idx];
                  const isCorrect = userAnsIdx === q.correctOption;
                  return (
                    <div key={q.id} className={`p-4 rounded-xl border transition-all ${
                      isCorrect 
                        ? "border-emerald-100 bg-emerald-50/10" 
                        : "border-rose-100 bg-rose-50/10"
                    }`}>
                      <div className="flex items-start justify-between gap-3 mb-2">
                        <div className="flex items-center gap-2">
                          <span className={`text-[10px] font-mono font-bold px-2 py-0.5 rounded-md ${
                            isCorrect 
                              ? "bg-emerald-100 text-emerald-850 border border-emerald-200" 
                              : "bg-rose-100 text-rose-850 border border-rose-200"
                          }`}>
                            Câu {idx + 1}
                          </span>
                          <span className="text-[11px] text-slate-500 font-medium font-sans">{q.category}</span>
                        </div>
                        
                        <div className="flex items-center gap-1.5 shrink-0">
                          {isCorrect ? (
                            <span className="text-xs font-semibold text-emerald-600 flex items-center gap-1 bg-emerald-50 px-2 py-0.5 rounded-md border border-emerald-200/50">
                              <LucideIcon name="Check" className="w-3 h-3 stroke-[3]" /> Đúng
                            </span>
                          ) : (
                            <span className="text-xs font-semibold text-rose-600 flex items-center gap-1 bg-rose-50 px-2 py-0.5 rounded-md border border-rose-200/50">
                              <LucideIcon name="X" className="w-3 h-3 stroke-[3]" /> Sai
                            </span>
                          )}
                        </div>
                      </div>

                      <p className="text-xs sm:text-sm font-bold text-slate-900 leading-relaxed mb-3">
                        {formatChemicalFormula(q.question)}
                      </p>

                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                        {q.options.map((opt, oIdx) => {
                          const isCorrectOpt = oIdx === q.correctOption;
                          const isUserPickedOpt = oIdx === userAnsIdx;
                          
                          let optClass = "border border-slate-150 bg-slate-50/50 text-slate-700";
                          if (isCorrectOpt) {
                            optClass = "border-emerald-400 bg-emerald-50/60 text-emerald-950 font-semibold";
                          } else if (isUserPickedOpt) {
                            optClass = "border-rose-400 bg-rose-50/60 text-rose-950 font-semibold";
                          } else {
                            optClass = "border-slate-100 bg-white opacity-60 text-slate-400";
                          }

                          return (
                            <div key={oIdx} className={`flex items-center gap-2 p-2.5 rounded-lg text-xs leading-normal ${optClass}`}>
                              <span className={`w-4.5 h-4.5 rounded-full flex items-center justify-center shrink-0 border text-[9px] font-mono font-bold ${
                                isCorrectOpt 
                                  ? "bg-emerald-500 border-emerald-500 text-white" 
                                  : isUserPickedOpt 
                                    ? "bg-rose-500 border-rose-500 text-white" 
                                    : "bg-slate-100 border-slate-200 text-slate-400"
                              }`}>
                                {String.fromCharCode(65 + oIdx)}
                              </span>
                              <span className="flex-1 overflow-hidden text-ellipsis">{formatChemicalFormula(opt)}</span>
                              
                              {isCorrectOpt && (
                                <LucideIcon name="Check" className="w-3.5 h-3.5 text-emerald-600 shrink-0" />
                              )}
                              {isUserPickedOpt && !isCorrectOpt && (
                                <LucideIcon name="X" className="w-3.5 h-3.5 text-rose-600 shrink-0" />
                              )}
                            </div>
                          );
                        })}
                      </div>

                      <div className="mt-3 p-3 rounded-xl border border-indigo-100 bg-indigo-50/30 text-indigo-950">
                        <h6 className="font-bold text-[9px] uppercase tracking-wider mb-1 text-indigo-900 flex items-center gap-1 font-mono">
                          <LucideIcon name="Lightbulb" className="w-3.5 h-3.5 text-indigo-600" />
                          Phân Tích Giải Thích Đáp Án:
                        </h6>
                        <p className="text-xs leading-relaxed opacity-95">
                          {formatChemicalFormula(q.explanation)}
                        </p>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      }

      const selectedOptionForCurrent = userAnswers[currentIndex];
      const hasChosenCurrent = selectedOptionForCurrent !== undefined;

      return (
        <div className="max-w-2xl mx-auto flex flex-col bg-white border border-slate-200 shadow-lg rounded-2xl overflow-hidden animate-fadeIn">
          <div className="px-5 py-3.5 bg-slate-50 border-b border-slate-200 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <span className="text-xs font-bold bg-indigo-100 text-indigo-800 border border-indigo-200 px-2.5 py-0.5 rounded-md font-mono">
                Câu {currentIndex + 1}/{questionsList.length}
              </span>
              <span className="text-xs text-slate-400 line-clamp-1 font-sans">{activeQuestion.category}</span>
            </div>
            <div className="text-xs font-mono font-semibold text-slate-500 bg-slate-200/60 px-2.5 py-0.5 rounded-full">
              Chế Độ Phân Tích
            </div>
          </div>

          <div className="w-full bg-slate-100 h-1">
            <div 
              className="bg-indigo-600 h-full transition-all duration-300"
              style={{ width: `${(currentIndex / questionsList.length) * 100}%` }}
            />
          </div>

          <div className="p-6 flex-1">
            <h3 className="text-base font-bold text-slate-900 leading-relaxed mb-6 font-display">
              {formatChemicalFormula(activeQuestion.question)}
            </h3>

            <div className="flex flex-col gap-3">
              {activeQuestion.options.map((opt, idx) => {
                const hasPickedThis = selectedOptionForCurrent === idx;
                
                let btnClasses = "border border-slate-200 bg-white hover:border-indigo-505 hover:border-indigo-500 hover:bg-indigo-50/50 text-slate-800 font-sans shadow-sm";
                if (hasPickedThis) {
                  btnClasses = "border-indigo-600 bg-indigo-50/70 text-indigo-950 font-semibold ring-2 ring-indigo-500/10 shadow-md";
                }

                return (
                  <button
                    key={idx}
                    onClick={() => handleOptionClick(idx)}
                    className={`flex items-center gap-3 p-3.5 rounded-xl text-left text-xs sm:text-sm transition-all cursor-pointer ${btnClasses}`}
                  >
                    <div className={`w-5.5 h-5.5 rounded-full flex items-center justify-center shrink-0 border text-[11px] font-mono font-bold ${
                      hasPickedThis 
                        ? "bg-indigo-600 border-indigo-600 text-white animate-scaleIn" 
                        : "bg-slate-50 border-slate-200 text-slate-500"
                    }`}>
                      {String.fromCharCode(65 + idx)}

          <div className="p-3.5 bg-slate-50 border-t border-slate-200 flex justify-between items-center">
            <span className="text-[11px] text-slate-500 italic">
              {hasChosenCurrent ? "✓ Đã chọn đáp án" : "Vui lòng chọn một đáp án bên trên"}
            </span>
            <button
              onClick={handleNext}
              disabled={!hasChosenCurrent}
              className={`flex items-center gap-1 px-4 py-2 text-white font-bold text-xs rounded-xl transition-all shadow-md ${
                hasChosenCurrent 
                  ? "bg-indigo-600 hover:bg-indigo-500 cursor-pointer" 
                  : "bg-slate-300 opacity-50 cursor-not-allowed text-slate-400"
              }`}
            >
              {currentIndex + 1 === questionsList.length ? "Hoàn thành và chấm điểm" : "Câu tiếp theo"}{" "}
              <LucideIcon name="ChevronRight" className="w-3.5 h-3.5" />
            </button>
          </div>
        </div>
      );
    }

    // --- COMPONENT 3: GUIDED SOLVER (TỰ LUẬN Từng Bước) ---
    function GuidedSolver() {
      const [activeProblemId, setActiveProblemId] = useState("gp_1");
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [userInput, setUserInput] = useState("");
      const [showHint, setShowHint] = useState(false);
      const [stepError, setStepError] = useState(null);
      const [completedSteps, setCompletedSteps] = useState([]);
      const [problemCompleted, setProblemCompleted] = useState(false);

      const activeProblem = GUIDED_PROBLEMS.find(p => p.id === activeProblemId) || GUIDED_PROBLEMS[0];

      const handleProblemChange = (id) => {
        setActiveProblemId(id);
        setCurrentStepIdx(0);
        setUserInput("");
        setShowHint(false);
        setStepError(null);
        setCompletedSteps([]);
        setProblemCompleted(false);
      };

      const activeStep = activeProblem.steps[currentStepIdx];

      const handleVerifyStep = (e) => {
        e.preventDefault();
        if (!activeStep) return;

        if (!userInput.trim()) {
          setStepError("Vui lòng điền đáp án trước khi nhấn Kiểm tra.");
          return;
        }

        const valResult = activeStep.validate(userInput);
        if (valResult.isValid) {
          setStepError(null);
          setUserInput("");
          setShowHint(false);
          const newCompleted = [...completedSteps, activeStep.id];
          setCompletedSteps(newCompleted);

          if (currentStepIdx + 1 < activeProblem.steps.length) {
            setCurrentStepIdx(currentStepIdx + 1);
          } else {
            setProblemCompleted(true);
          }
        } else {
          setStepError(valResult.errorMsg || "Kết quả chưa đúng, hãy kiểm tra lại hoặc xem gợi ý!");
        }
      };

      const handleResetProblem = () => {
        setCurrentStepIdx(0);
        setUserInput("");
        setShowHint(false);
        setStepError(null);
        setCompletedSteps([]);
        setProblemCompleted(false);
      };

      return (
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <div className="lg:col-span-1 flex flex-col gap-3">

              const isSelected = activeProblemId === prob.id;
              return (
                <button
                  key={prob.id}

                  className={`p-3 text-left rounded-xl border transition-all text-xs flex flex-col gap-1 ${

                  </span>
                  <span className="font-bold text-slate-900 line-clamp-1 leading-snug">{formatChemicalFormula(prob.title)}</span>
                </button>
              );

            <div className="bg-white border border-slate-200 rounded-2xl p-4 mt-2 shadow-sm">

              <div className="flex flex-col gap-2.5">
                {activeProblem.steps.map((step, idx) => {

                      }`}>
                        {step.id}
                      </div>
                      <span className={`text-[11px] truncate block ${
                        isPast ? "text-slate-400 line-through" : isActive ? "text-indigo-950 font-bold" : "text-slate-500"
                      }`}>{step.title}</span>
                    </div>
                  );
                })}

            </div>
          </div>

          <div className="lg:col-span-2 bg-white border border-slate-200 shadow-md rounded-2xl overflow-hidden flex flex-col animate-fadeIn">
            <div className="p-5 bg-gradient-to-r from-slate-50 to-white border-b border-slate-200 font-sans">

            <div className="p-6 flex-1 bg-white">
              {problemCompleted ? (

                      <span className="text-[9px] font-mono text-indigo-700 font-bold uppercase bg-indigo-50 border border-indigo-100 px-2 py-0.5 rounded">Bước {currentStepIdx + 1} / {activeProblem.steps.length}</span>

    // --- COMPONENT 4: INCORRECT VAULT --
    function IncorrectVault({ logs, onClearLogs, onSelectTab }) {

        setAiAnswers({});
        setShowAiExplains({});

        try {
          // Attempt hitting the proxy API hosted during workspace
          const response = await fetch("/api/generate-reinforce", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              wrongQuestions: logs.map(log => ({
                question: log.originalQuestion.question,
                category: log.originalQuestion.category,
                userAnswerIndex: log.userAnswerIndex
              }))
            })
          });

          if (!response.ok) throw new Error("HTTP error " + response.status);
          const data = await response.json();
          if (data.success && data.questions) {
            setAiQuestions(data.questions);
            if (data.isMocked) {
              setAiWarning(data.debugMessage || "Đã nạp câu hỏi củng cố hóa học.");
            }
          } else {
            throw new Error("Không thể chuyển đổi.");
          }
        } catch (err) {
          console.warn("Utilizing offline fallback:", err);
          setAiWarning("Máy chủ AI chuẩn kết nối ngoại tuyến. Hệ thống đã kích hoạt khóa củng cố lý thuyết ngoại tuyến.");
          setAiQuestions([
            {
              id: "local_re_1", part: 1, category: "Củng cố Tính số oxi hóa",
              question: "Xác định số oxi hóa của photpho (P) trong axit photphoric H₃PO₄.",
              options: ["+1", "+3", "+5", "-3"], correctOption: 2,
              explanation: "Trong H₃PO₄, H là +1, O là -2. Gọi x là số oxi hóa của P: 3*(+1) + x + 4*(-2) = 0 => x = +5. Vậy số oxi hóa photpho là +5."
            },
            {
              id: "local_re_2", part: 2, category: "Củng cố Thăng bằng electron",
              question: "Cân bằng phản ứng: Zn + HNO₃ → Zn(NO₃)₂ + NH₄NO₃ + H₂O. Xác định hệ số đứng trước HNO₃ tối giản?",
              options: ["4", "10", "12", "6"], correctOption: 1,
              explanation: "4Zn⁰ → 4Zn⁺² + 8e ; N⁺⁵ + 8e → N⁻³ (NH₄NO₃). Hệ số: 4Zn + 10HNO₃ → 4Zn(NO₃)₂ + NH₄NO₃ + 3H₂O. Hệ số HNO₃ là 10."
            },
            {
              id: "local_re_3", part: 3, category: "Củng cố Tính số mol",
              question: "Tính thể tích khí H₂ (lít ở đkc) thoát ra khi cho 5,4g nhôm (Al) tác dụng axit loãng dư? (Al=27)",
              options: ["4,958", "7,437", "6,720", "2,479"], correctOption: 1,
              explanation: "n(Al) = 5.4 / 27 = 0.2 mol. Phản ứng: 2Al + 6HCl → 2AlCl₃ + 3H₂. n(H₂) = 1.5 * n(Al) = 0.3 mol. V(H₂) = 0.3 * 24.79 = 7.437 lít."
            }
          ]);
        } finally {
          setLoadingAI(false);
        }
      };

      const handleSelectAIOption = (qId, optIdx) => {
        if (aiAnswers[qId] !== undefined) return;
        setAiAnswers(prev => ({ ...prev, [qId]: optIdx }));
        setShowAiExplains(prev => ({ ...prev, [qId]: true }));
      };

      return (
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <div className="lg:col-span-2 flex flex-col gap-4">

              <div>
                <h3 className="text-base font-bold text-slate-950 flex items-center gap-2 font-display">📝 Sổ Tay Lỗi Sai Cá Nhân</h3>
                <p className="text-xs text-slate-500 mt-0.5">Tự động tích lũy các lỗi tư duy đề kiểm tra của bạn.</p>
              </div>
              {logs.length > 0 && (
                <button
                  onClick={onClearLogs}
                  className="px-3.5 py-1.5 hover:bg-rose-50 text-rose-600 border border-slate-100 hover:border-rose-200 rounded-xl text-xs font-semibold flex items-center gap-1 transition-all cursor-pointer"
                >
                  <LucideIcon name="Trash2" className="w-3.5 h-3.5" /> Xóa sổ tay
                </button>
              )}
            </div>

            {logs.length === 0 ? (
              <div className="bg-white border border-slate-200 rounded-2xl p-10 text-center shadow-sm">
                <LucideIcon name="CheckCircle2" className="w-12 h-12 text-emerald-500 mx-auto mb-2" />
                <h4 className="text-sm font-bold text-slate-900 mb-1">Chưa ghi nhận lỗi sai!</h4>
                <p className="text-xs text-slate-500 max-w-xs mx-auto mb-4 font-sans">Chúc mừng bạn trả lời chính xác mọi câu hỏi. Hãy vào thử thách từng phần để kiểm nghiệm nhé!</p>
                <button onClick={() => onSelectTab("theory")} className="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs rounded-xl shadow-md transition-all">
                  Mở Lý thuyết ôn tiếp <LucideIcon name="ChevronRight" className="w-3 h-3 inline ms-1" />
                </button>
              </div>
            ) : (
              <div className="flex flex-col gap-4">
                {logs.map((log, idx) => (
                  <div key={idx} className="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm border-l-4 border-l-rose-500 animate-fadeIn">
                    <div className="flex items-center justify-between border-b border-slate-101 pb-2.5 mb-3.5">
                      <span className="text-[9px] font-mono font-bold uppercase bg-rose-50 text-rose-700 px-2 py-0.5 rounded border border-rose-100">CÂU SAI SỐ #{logs.length - idx}</span>
                      <span className="text-xs text-slate-400 font-mono">Chủ đề {log.originalQuestion.part}</span>
                    </div>

                    <h4 className="text-sm font-bold text-slate-950 leading-relaxed mb-3 font-display">
                      {formatChemicalFormula(log.originalQuestion.question)}
                    </h4>

                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
                      <div className="p-3 bg-rose-50 border border-rose-100 rounded-xl flex items-start gap-2 text-xs">
                        <LucideIcon name="XCircle" className="w-4.5 h-4.5 text-rose-500 mt-0.5 shrink-0" />
                        <div>
                          <span className="text-rose-450 block font-semibold uppercase tracking-wider text-[8px]">Bạn đã chọn:</span>
                          <span className="text-rose-950 font-bold leading-normal">{formatChemicalFormula(log.originalQuestion.options[log.userAnswerIndex])}</span>
                        </div>
                      </div>

                      <div className="p-3 bg-emerald-50 border border-emerald-200 rounded-xl flex items-start gap-2 text-xs">

                          <span className="text-emerald-450 block font-semibold uppercase tracking-wider text-[8px]">Đáp án chính xác:</span>
                          <span className="text-emerald-950 font-bold leading-normal">{formatChemicalFormula(log.originalQuestion.options[log.originalQuestion.correctOption])}</span>
                        </div>
                      </div>

                    <div className="p-3 bg-emerald-50/50 border border-emerald-150 rounded-xl text-xs text-emerald-900 leading-relaxed shadow-inner">

                    </div>
                  </div>
                ))}
              </div>

              <div className="flex gap-2.5 relative z-10">

                  <LucideIcon name="Brain" className="w-5.5 h-5.5 animate-pulse" />
                </div>
                <div>
                  <span className="text-[10px] font-mono tracking-widest text-indigo-400 font-bold block uppercase">TRỰC QUAN SƯ PHẠM</span>
                  <h3 className="text-sm font-bold mt-0.5 text-white font-display">Tạo Bài Củng Cố AI</h3>
                </div>
              </div>

              <p className="text-xs text-indigo-100/90 leading-relaxed">
                Hệ thống dựa trên **Google Gemini AI** phân tích những lỗi sai ở sổ tay của riêng bạn, biên soạn 3 câu hỏi hoàn toàn mới khắc phục dứt điểm lỗ hổng.
              </p>

              <button
                onClick={generateAIReinforcement}
                disabled={logs.length === 0 || loadingAI}
                className="w-full mt-1.5 py-2.5 bg-indigo-600 disabled:bg-slate-800 disabled:text-slate-500 disabled:cursor-not-allowed hover:bg-indigo-504 hover:bg-indigo-500 text-white font-bold text-xs rounded-xl shadow-md transition-all flex items-center justify-center gap-1.5 uppercase tracking-wider cursor-pointer relative z-10"
              >
                {loadingAI ? (
                  <>
                    <LucideIcon name="RefreshCw" className="w-4 h-4 animate-spin" /> Đang tổng hợp...
                  </>

                  <>
                    <LucideIcon name="Sparkles" className="w-4 h-4 text-indigo-305" /> Kích hoạt Đề củng cố AI
                  </>
                )}
              </button>
            </div>

            {loadingAI && (
              <div className="bg-white border border-slate-200 shadow-md rounded-2xl p-6 text-center flex flex-col items-center justify-center gap-2 animate-pulse">

                <h4 className="text-xs font-bold text-slate-800 mt-2 font-display">Đang biên soạn thử thách...</h4>

            )}

            {aiQuestions && aiQuestions.length > 0 && (
              <div className="flex flex-col gap-4">
                <div className="bg-indigo-50 border border-indigo-200 rounded-xl p-3 text-indigo-950 text-xs flex gap-2 items-start font-semibold">
                  <LucideIcon name="Sparkles" className="w-4 h-4 shrink-0 mt-0.5 text-indigo-600 animate-pulse" />
                  <div>
                    <strong>3 Bài tập cộc bộ AI đã sẵn sàng!</strong>
                    {aiWarning && <p className="text-[9px] opacity-80 mt-1">{aiWarning}</p>}
                  </div>
                </div>

                {aiQuestions.map((q, idx) => {
                  const isAnswered = aiAnswers[q.id] !== undefined;
                  const hasPicked = aiAnswers[q.id];
                  const isCorrectAnswer = hasPicked === q.correctOption;

                  return (
                    <div key={q.id || idx} className="bg-white border border-slate-200 shadow-lg rounded-2xl p-4.5 flex flex-col gap-3 animate-fadeIn">
                      <div className="flex items-center justify-between">
                        <span className="text-[9px] font-mono font-bold bg-indigo-100 text-indigo-800 border border-indigo-200 px-2 py-0.5 rounded">CÂU AI #{idx + 1}</span>
                        <span className="text-[9px] text-slate-400 font-bold font-mono">Phần {q.part}</span>
                      </div>

                      <h4 className="text-xs font-bold text-slate-900 leading-normal">
                        {formatChemicalFormula(q.question)}
                      </h4>

                      <div className="flex flex-col gap-2">
                        {q.options.map((opt, oIdx) => {
                          const optSelected = hasPicked === oIdx;
                          const optIsCorrect = oIdx === q.correctOption;

                          let optClass = "border border-slate-200 text-slate-800 bg-white hover:border-indigo-500 hover:bg-indigo-50/50 shadow-sm cursor-pointer";
                          if (isAnswered) {
                            if (optIsCorrect) optClass = "border-emerald-500 bg-emerald-50 text-emerald-950 font-bold shadow-inner";
                            else if (optSelected) optClass = "border-rose-300 bg-rose-50 text-rose-950 shadow-inner";
                            else optClass = "opacity-40 border-slate-100 text-slate-450 cursor-not-allowed";
                          }

                          return (
                            <button
                              key={oIdx}
                              disabled={isAnswered}
                              onClick={() => handleSelectAIOption(q.id, oIdx)}
                              className={`w-full text-left p-2.5 rounded-lg text-xs flex items-center gap-2 transition-all ${optClass}`}
                            >
                              <span className={`w-4.5 h-4.5 rounded-full flex items-center justify-center shrink-0 text-[10px] font-mono font-bold border ${
                                isAnswered ? optIsCorrect ? "bg-emerald-500 border-emerald-500 text-white" : optSelected ? "bg-rose-505 bg-rose-500 border-rose-500 text-white" : "text-slate-400 bg-slate-100" : "text-slate-500 bg-slate-50"
                              }`}>
                                {String.fromCharCode(65 + oIdx)}
                              </span>
                              <span className="flex-1 font-sans leading-normal">{formatChemicalFormula(opt)}</span>
                            </button>
                          );
                        })}
                      </div>

                      {showAiExplains[q.id] && (
                        <div className="p-3 bg-emerald-50 border border-emerald-200 rounded-xl text-emerald-900 text-[11px] leading-relaxed animate-fadeIn shadow-inner">
                          <h5 className="font-bold text-[9px] text-emerald-950 uppercase tracking-wider mb-1 flex items-center gap-1">Sư phạm AI lý giải:</h5>
                          <p className="font-sans leading-normal text-emerald-950/90">{formatChemicalFormula(q.explanation)}</p>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- MAIN APP ENTRY POINT ---
    function App() {
      const [activeTab, setActiveTab] = useState("theory");
      const [quizPart, setQuizPart] = useState(QuestionPart.PART1);
      const [incorrectLogs, setIncorrectLogs] = useState([]);
      const [totalAttempts, setTotalAttempts] = useState(0);

      useEffect(() => {
        try {
          const stored = localStorage.getItem("learned_chem_mistakes_v1");
          if (stored) setIncorrectLogs(JSON.parse(stored));
          const count = localStorage.getItem("learned_chem_attempts_count_v1");
          if (count) setTotalAttempts(parseInt(count, 10));
        } catch (err) {
          console.error("Error localstorage logic", err);
        }
      }, []);

      const saveLogs = (newLogs) => {
        setIncorrectLogs(newLogs);
        try {
          localStorage.setItem("learned_chem_mistakes_v1", JSON.stringify(newLogs));
        } catch (err) {
          console.error(err);
        }
      };

      const handleLogMistake = (log) => {
        const exists = incorrectLogs.some(item => item.questionId === log.questionId);
        if (!exists) {
          const updated = [log, ...incorrectLogs];
          saveLogs(updated);
        }
        const newCount = totalAttempts + 1;
        setTotalAttempts(newCount);
        localStorage.setItem("learned_chem_attempts_count_v1", newCount.toString());
      };

      const handleClearLogs = () => {
        if (confirm("Bạn có muốn dọn dẹp sạch sẽ sổ tay tích lũy câu sai không?")) {
          saveLogs([]);
        }
      };

      const handleStartQuiz = (partNum) => {
        setQuizPart(partNum);
        setActiveTab("quiz");
      };

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 antialiased font-sans flex flex-col">
          <div className="h-1.5 w-full bg-indigo-600 shrink-0"></div>

          <header className="bg-white border-b border-slate-200 py-3.5 px-4 sm:px-6 sticky top-0 z-50 shadow-sm shrink-0">
            <div className="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 bg-indigo-600 rounded-lg flex items-center justify-center text-white shadow-lg font-bold text-lg select-none">H₂</div>
                <div>
                  <h1 className="text-sm sm:text-base font-extrabold text-slate-950 tracking-tight flex items-center gap-2 font-display">
                    Luyện Tập Tính Toán Hóa Học
                    <span className="text-[9px] bg-indigo-50 text-indigo-800 px-2.5 py-0.5 rounded-full border border-indigo-100 font-bold font-mono tracking-wider">
                      ChemLogic v2.5
                    </span>
                  </h1>
                  <p className="text-[10px] sm:text-xs text-slate-450 text-slate-400 md:mt-0.5 mt-0 font-sans">Bài tập số oxi hóa, thăng bằng electron & giải bài toán THPT quốc gia</p>
                </div>
              </div>

              <div className="flex items-center gap-4 text-xs divide-x divide-slate-200">
                <div className="flex flex-col items-end px-3">
                  <span className="text-slate-400 block font-mono text-[8.5px] uppercase">Ghi nhận lỗi</span>
                  <span className="font-bold text-rose-600 text-[13px] font-mono">{incorrectLogs.length} câu</span>
                </div>
                <div className="flex flex-col items-end px-3">
                  <span className="text-slate-400 block font-mono text-[8.5px] uppercase">Tình trạng sổ tay</span>
                  <span className="font-semibold text-indigo-700 bg-indigo-50 border border-indigo-100 px-2 py-0.5 rounded text-[10px] mt-0.5">
                    {incorrectLogs.length > 0 ? "⚠️ Cần giải quyết" : "✨ Sạch sẽ lỗi"}
                  </span>
                </div>
              </div>
            </div>
          </header>

          <nav className="bg-slate-900 text-white border-b border-slate-800 py-1 px-4 sticky top-[62px] z-40 shadow-md">
            <div className="max-w-7xl mx-auto flex items-center gap-1 overflow-x-auto scroller-hidden">
              <button onClick={() => setActiveTab("theory")} className={`px-4 py-2 text-xs font-semibold rounded-lg transition-all flex items-center gap-1.5 whitespace-nowrap ${activeTab === "theory" ? "bg-indigo-600/90 text-white shadow" : "text-slate-300 hover:text-white"}`}>
                <LucideIcon name="BookOpen" className="w-4 h-4" /> 1. Giáo Trình Lý Thuyết
              </button>
              <button onClick={() => setActiveTab("quiz")} className={`px-4 py-2 text-xs font-semibold rounded-lg transition-all flex items-center gap-1.5 whitespace-nowrap ${activeTab === "quiz" ? "bg-indigo-600/90 text-white shadow" : "text-slate-300 hover:text-white"}`}>
                <LucideIcon name="Layers" className="w-4 h-4" /> 2. Trắc Nghiệm Từng Phần
              </button>
              <button onClick={() => setActiveTab("guided")} className={`px-4 py-2 text-xs font-semibold rounded-lg transition-all flex items-center gap-1.5 whitespace-nowrap ${activeTab === "guided" ? "bg-indigo-600/90 text-white shadow" : "text-slate-300 hover:text-white"}`}>
                <LucideIcon name="Award" className="w-4 h-4" /> 3. Trình Giải Tự Luận
              </button>
              <button onClick={() => setActiveTab("vault")} className={`px-4 py-2 text-xs font-semibold rounded-lg transition-all flex items-center gap-1.5 whitespace-nowrap relative ${activeTab === "vault" ? "bg-indigo-600/90 text-white shadow" : "text-slate-300 hover:text-white"}`}>
                <LucideIcon name="Bookmark" className="w-4 h-4" /> 4. Sổ Lỗi Sai & AI Thầy Cô
                {incorrectLogs.length > 0 && (
                  <span className="absolute -top-0.5 -right-0.5 w-4 h-4 bg-amber-500 text-amber-950 text-[9px] font-bold rounded-full flex items-center justify-center font-mono">
                    {incorrectLogs.length}
                  </span>
                )}
              </button>
            </div>
          </nav>

          <main className="flex-1 p-4 sm:p-6 max-w-7xl w-full mx-auto">
            {activeTab === "theory" && (
              <div className="animate-fadeIn">
                <div className="mb-5 bg-white border border-slate-200 rounded-xl p-5 shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4">
                  <div className="max-w-xl">
                    <h2 className="text-sm sm:text-base font-bold text-slate-900 flex items-center gap-2 font-display">
                      <LucideIcon name="Sparkles" className="w-4.5 h-4.5 text-indigo-600 animate-pulse" /> Sổ Tay Lý Thuyết Hóa Học Trực Quan
                    </h2>
                    <p className="text-[11px] sm:text-xs text-slate-500 mt-1 leading-relaxed">
                      Lựa chọn các thẻ chủ đề hóa học ở cột bên trái để học nhanh quy tắc thăng bằng electron, số mol hay cách thăng bằng, sau đó kiểm tra nhanh để khắc sâu.
                    </p>
                  </div>
                </div>
                <TheoryCard onStartQuiz={handleStartQuiz} />
              </div>
            )}

            {activeTab === "quiz" && (
              <div className="animate-fadeIn flex flex-col gap-4">
                <div className="bg-white border border-slate-200 p-4 rounded-xl shadow-sm flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                  <div>
                    <h4 className="text-[9px] font-semibold text-slate-400 uppercase tracking-wider font-mono">CHỌN CHUYÊN ĐỀ PHẦN</h4>
                    <div className="text-xs sm:text-sm font-bold text-slate-950 mt-0.5 font-display">
                      Bài kiểm tra: {quizPart === QuestionPart.PART1 ? "Phần 1 - Xác định số oxi hóa" : quizPart === QuestionPart.PART2 ? "Phần 2 - Thăng bằng Electron" : "Phần 3 - Tính số mol"}
                    </div>
                  </div>

                  <div className="flex items-center gap-1.5 bg-slate-100 p-1 rounded-xl shrink-0">
                    <button onClick={() => setQuizPart(QuestionPart.PART1)} className={`px-2.5 py-1 rounded-lg text-[11px] font-bold transition-all ${quizPart === QuestionPart.PART1 ? "bg-indigo-650 bg-indigo-600 text-white shadow-sm" : "text-slate-505 text-slate-500 hover:text-indigo-600"}`}>Số Oxi Hóa</button>
                    <button onClick={() => setQuizPart(QuestionPart.PART2)} className={`px-2.5 py-1 rounded-lg text-[11px] font-bold transition-all ${quizPart === QuestionPart.PART2 ? "bg-indigo-650 bg-indigo-600 text-white shadow-sm" : "text-slate-505 text-slate-500 hover:text-indigo-600"}`}>Cân Bằng Phản Ứng</button>
                    <button onClick={() => setQuizPart(QuestionPart.PART3)} className={`px-2.5 py-1 rounded-lg text-[11px] font-bold transition-all ${quizPart === QuestionPart.PART3 ? "bg-indigo-650 bg-indigo-600 text-white shadow-sm" : "text-slate-505 text-slate-500 hover:text-indigo-600"}`}>Số Mol Cơ Bản</button>
                  </div>
                </div>

                <QuizEngine part={quizPart} onLogMistake={handleLogMistake} onViewMistakes={() => setActiveTab("vault")} />
              </div>
            )}

            {activeTab === "guided" && (
              <div className="animate-fadeIn">
                <GuidedSolver />
              </div>
            )}

            {activeTab === "vault" && (
              <div className="animate-fadeIn">
                <IncorrectVault logs={incorrectLogs} onClearLogs={handleClearLogs} onSelectTab={(tab) => setActiveTab(tab)} />
              </div>
            )}
          </main>

          <footer className="bg-white border-t border-slate-150 py-5 text-center text-[10.5px] text-slate-450 text-slate-400 shrink-0 px-4 mt-8">
            <div className="max-w-7xl mx-auto flex flex-col sm:flex-row sm:items-center justify-between gap-3">
              <p>© 2026 Ôn thi Hóa học THPT - Giáo trình và bài giải tích hợp offline.</p>
              <div className="flex items-center gap-3.5 justify-center font-mono text-[9px] uppercase">
                <span>Tiêu chuẩn ĐKC: 24,79 L/mol</span>
                <span>Tự động thích hợp AI củng cố</span>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    // Mount the Application inside the Root element
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
